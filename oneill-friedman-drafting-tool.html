<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>O'Neill Friedman — Legal Document Drafter</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', serif;
      background: #f4f1eb;
      color: #1a1a1a;
      min-height: 100vh;
    }

    header {
      background: #1a2744;
      color: white;
      padding: 24px 40px;
      display: flex;
      align-items: center;
      gap: 16px;
    }

    header .logo {
      font-size: 22px;
      font-weight: bold;
      letter-spacing: 0.5px;
    }

    header .logo span {
      color: #c9a84c;
    }

    header .tagline {
      font-size: 13px;
      color: #9baabf;
      font-style: italic;
      margin-left: auto;
    }

    .container {
      max-width: 900px;
      margin: 40px auto;
      padding: 0 24px;
    }

    .card {
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.08);
      padding: 36px;
      margin-bottom: 24px;
    }

    .card h2 {
      font-size: 18px;
      color: #1a2744;
      margin-bottom: 24px;
      padding-bottom: 12px;
      border-bottom: 2px solid #c9a84c;
    }

    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-group.full {
      grid-column: 1 / -1;
    }

    label {
      font-size: 12px;
      font-weight: bold;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #555;
    }

    input, select, textarea {
      padding: 10px 14px;
      border: 1px solid #d0d0d0;
      border-radius: 5px;
      font-size: 14px;
      font-family: inherit;
      color: #1a1a1a;
      background: #fafafa;
      transition: border 0.2s;
      outline: none;
    }

    input:focus, select:focus, textarea:focus {
      border-color: #1a2744;
      background: white;
    }

    textarea {
      resize: vertical;
      min-height: 90px;
    }

    .api-note {
      font-size: 12px;
      color: #888;
      margin-top: 4px;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 13px 28px;
      border: none;
      border-radius: 5px;
      font-size: 15px;
      font-family: inherit;
      cursor: pointer;
      font-weight: bold;
      transition: all 0.2s;
    }

    .btn-primary {
      background: #1a2744;
      color: white;
      width: 100%;
      justify-content: center;
      margin-top: 24px;
      font-size: 16px;
      padding: 15px;
    }

    .btn-primary:hover { background: #243660; }
    .btn-primary:disabled { background: #999; cursor: not-allowed; }

    .btn-secondary {
      background: #f0f0f0;
      color: #333;
      font-size: 13px;
      padding: 8px 16px;
    }

    .btn-secondary:hover { background: #e0e0e0; }

    .btn-gold {
      background: #c9a84c;
      color: white;
      font-size: 13px;
      padding: 8px 16px;
    }

    .btn-gold:hover { background: #b8963e; }

    .output-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      padding-bottom: 12px;
      border-bottom: 2px solid #c9a84c;
    }

    .output-header h2 { margin-bottom: 0; border: none; padding: 0; }

    .output-actions { display: flex; gap: 8px; }

    #output {
      white-space: pre-wrap;
      font-family: 'Courier New', monospace;
      font-size: 13.5px;
      line-height: 1.8;
      color: #1a1a1a;
      background: #fafaf8;
      border: 1px solid #e0e0e0;
      border-radius: 5px;
      padding: 24px;
      min-height: 200px;
    }

    .spinner {
      display: inline-block;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .hidden { display: none; }

    .status-bar {
      text-align: center;
      font-size: 13px;
      color: #888;
      margin-top: 10px;
      min-height: 20px;
    }

    .status-bar.error { color: #c0392b; }
    .status-bar.success { color: #27ae60; }

    .badge {
      display: inline-block;
      background: #e8f0fe;
      color: #1a2744;
      font-size: 11px;
      font-weight: bold;
      padding: 3px 8px;
      border-radius: 12px;
      margin-left: 8px;
      vertical-align: middle;
    }
  </style>
</head>
<body>

<header>
  <div class="logo">O'Neill <span>Friedman</span> LLC</div>
  <div class="tagline">AI Legal Document Drafter <span class="badge">BETA</span></div>
</header>

<div class="container">

  <div class="card">
    <h2>Case Details</h2>
    <div class="form-grid">

      <div class="form-group full">
        <label>Anthropic API Key</label>
        <input type="password" id="apiKey" placeholder="sk-ant-..." />
        <div class="api-note">Your key is never stored or sent anywhere except directly to Anthropic.</div>
      </div>

      <div class="form-group">
        <label>Document Type</label>
        <select id="docType">
          <option value="demand_letter">Demand Letter</option>
          <option value="complaint">Complaint (Civil)</option>
          <option value="motion_compel">Motion to Compel</option>
          <option value="settlement_letter">Settlement Counteroffer Letter</option>
          <option value="client_update">Client Update Letter</option>
          <option value="cease_desist">Cease & Desist Letter</option>
        </select>
      </div>

      <div class="form-group">
        <label>Jurisdiction / State</label>
        <input type="text" id="jurisdiction" placeholder="e.g. New York, NY" />
      </div>

      <div class="form-group">
        <label>Client Name</label>
        <input type="text" id="clientName" placeholder="e.g. Jane Smith" />
      </div>

      <div class="form-group">
        <label>Defendant / Opposing Party</label>
        <input type="text" id="defendant" placeholder="e.g. ABC Corporation" />
      </div>

      <div class="form-group">
        <label>Incident Type</label>
        <select id="incidentType">
          <option value="car_accident">Motor Vehicle Accident</option>
          <option value="slip_fall">Slip & Fall</option>
          <option value="medical_malpractice">Medical Malpractice</option>
          <option value="workplace_injury">Workplace Injury</option>
          <option value="product_liability">Product Liability</option>
          <option value="wrongful_death">Wrongful Death</option>
          <option value="other">Other</option>
        </select>
      </div>

      <div class="form-group">
        <label>Date of Incident</label>
        <input type="date" id="incidentDate" />
      </div>

      <div class="form-group full">
        <label>Injuries / Damages</label>
        <textarea id="injuries" placeholder="Describe the injuries, medical treatment received, ongoing symptoms, lost wages, pain and suffering, etc."></textarea>
      </div>

      <div class="form-group full">
        <label>Key Facts / Additional Notes</label>
        <textarea id="notes" placeholder="Any other relevant facts, witness names, prior communications, settlement amounts, deadlines, etc."></textarea>
      </div>

    </div>

    <button class="btn btn-primary" id="generateBtn" onclick="generate()">
      <span id="btnText">Generate Document</span>
      <span id="btnSpinner" class="spinner hidden"></span>
    </button>
    <div class="status-bar" id="statusBar"></div>
  </div>

  <div class="card hidden" id="outputCard">
    <div class="output-header">
      <h2>Generated Document</h2>
      <div class="output-actions">
        <button class="btn btn-secondary" onclick="copyText()">Copy</button>
        <button class="btn btn-gold" onclick="downloadDoc()">Download .txt</button>
      </div>
    </div>
    <div id="output"></div>
  </div>

</div>

<script>
  const PROMPTS = {
    demand_letter: "Draft a formal demand letter from a plaintiff attorney to the opposing party. The tone should be firm, professional, and legally assertive. Include a clear statement of liability, summary of damages, and a specific demand for compensation with a response deadline.",
    complaint: "Draft a civil complaint suitable for filing in court. Include numbered paragraphs with: jurisdiction and venue, parties, factual background, causes of action (negligence at minimum), and a prayer for relief including compensatory and punitive damages.",
    motion_compel: "Draft a motion to compel discovery responses. Include a brief introduction, factual background on the discovery dispute, legal standard, argument section citing the obligation to respond, and a conclusion requesting the court order responses within 14 days.",
    settlement_letter: "Draft a settlement counteroffer letter responding to a low initial offer from the defense. Be professional but firm. Restate the strength of the plaintiff's case, summarise damages in detail, and present a counteroffer with clear justification.",
    client_update: "Draft a professional client update letter explaining the current status of their case in plain English (no legal jargon). Be empathetic, clear about next steps, and reassuring about the firm's commitment to their case.",
    cease_desist: "Draft a cease and desist letter demanding the opposing party immediately stop the harmful conduct described. State the legal basis, describe the harm caused, and warn of legal action if conduct does not stop within 10 days."
  };

  const DOC_NAMES = {
    demand_letter: "Demand Letter",
    complaint: "Civil Complaint",
    motion_compel: "Motion to Compel",
    settlement_letter: "Settlement Counteroffer Letter",
    client_update: "Client Update Letter",
    cease_desist: "Cease & Desist Letter"
  };

  async function generate() {
    const apiKey = document.getElementById('apiKey').value.trim();
    const docType = document.getElementById('docType').value;
    const clientName = document.getElementById('clientName').value.trim();
    const defendant = document.getElementById('defendant').value.trim();
    const incidentType = document.getElementById('incidentType').value.replace(/_/g, ' ');
    const incidentDate = document.getElementById('incidentDate').value;
    const jurisdiction = document.getElementById('jurisdiction').value.trim();
    const injuries = document.getElementById('injuries').value.trim();
    const notes = document.getElementById('notes').value.trim();

    if (!apiKey) return setStatus('Please enter your Anthropic API key.', 'error');
    if (!clientName) return setStatus('Please enter the client name.', 'error');
    if (!defendant) return setStatus('Please enter the defendant name.', 'error');
    if (!injuries) return setStatus('Please describe the injuries or damages.', 'error');

    setLoading(true);
    setStatus('Drafting document...');
    document.getElementById('outputCard').classList.add('hidden');

    const systemPrompt = `You are a senior plaintiff attorney at O'Neill Friedman LLC with 20 years of experience in personal injury and civil litigation. You draft precise, persuasive legal documents that protect your clients' interests. Always use proper legal formatting with today's date, party names, and clear section headers. Today's date is ${new Date().toLocaleDateString('en-US', {year:'numeric',month:'long',day:'numeric'})}.`;

    const userPrompt = `${PROMPTS[docType]}

Case details:
- Client (Plaintiff): ${clientName}
- Defendant: ${defendant}
- Incident type: ${incidentType}
- Date of incident: ${incidentDate || 'not specified'}
- Jurisdiction: ${jurisdiction || 'not specified'}
- Injuries and damages: ${injuries}
${notes ? `- Additional facts: ${notes}` : ''}

Draft the complete ${DOC_NAMES[docType]} now. Use proper legal formatting. Do not add any commentary or explanations outside the document itself.`;

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'x-api-key': apiKey,
          'anthropic-version': '2023-06-01',
          'anthropic-dangerous-direct-browser-access': 'true'
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-6',
          max_tokens: 2000,
          messages: [{ role: 'user', content: userPrompt }],
          system: systemPrompt
        })
      });

      if (!response.ok) {
        const err = await response.json();
        throw new Error(err.error?.message || `API error ${response.status}`);
      }

      const data = await response.json();
      const text = data.content[0].text;

      document.getElementById('output').textContent = text;
      document.getElementById('outputCard').classList.remove('hidden');
      document.getElementById('outputCard').scrollIntoView({ behavior: 'smooth' });
      setStatus('Document generated successfully.', 'success');
    } catch (err) {
      setStatus('Error: ' + err.message, 'error');
    } finally {
      setLoading(false);
    }
  }

  function setLoading(on) {
    const btn = document.getElementById('generateBtn');
    const text = document.getElementById('btnText');
    const spinner = document.getElementById('btnSpinner');
    btn.disabled = on;
    text.textContent = on ? 'Drafting...' : 'Generate Document';
    spinner.classList.toggle('hidden', !on);
  }

  function setStatus(msg, type = '') {
    const bar = document.getElementById('statusBar');
    bar.textContent = msg;
    bar.className = 'status-bar ' + type;
  }

  function copyText() {
    const text = document.getElementById('output').textContent;
    navigator.clipboard.writeText(text).then(() => setStatus('Copied to clipboard.', 'success'));
  }

  function downloadDoc() {
    const text = document.getElementById('output').textContent;
    const docType = document.getElementById('docType').value;
    const clientName = document.getElementById('clientName').value.trim().replace(/\s+/g, '_') || 'document';
    const filename = `${clientName}_${DOC_NAMES[docType].replace(/\s+/g, '_')}.txt`;
    const blob = new Blob([text], { type: 'text/plain' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
  }
</script>

</body>
</html>
